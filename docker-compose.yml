version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - file-sync-service:latest
        - file-sync-service:${VERSION:-1.0.0}
    container_name: file-sync-service
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SOURCE_DIR=/data/sync-source
      - TARGET_DIR=/data/sync-target
      - DATA_DIR=/data/app-data
      - AUTO_START=${AUTO_START:-true}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-5000}
    volumes:
      - ./data/sync-source:/data/sync-source
      - ./data/sync-target:/data/sync-target
      - ./data/app-data:/data/app-data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  app-data:
